services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  server:
    build: ./leaveboard-server
    container_name: leaveboard-server
    restart: unless-stopped
    env_file: ./.env
    environment:
      NODE_ENV: development
    depends_on: [mongo]
    ports: ["${PORT:-7077}:${PORT:-7077}"]
    volumes:
      - ./leaveboard-server:/app
      - /app/node_modules
    command: node --watch index.js

  client:
    build:
      context: ./leaveboard-client
      args:
        VITE_BASE_URL: ${VITE_BASE_URL:-http://localhost:7077}
    container_name: leaveboard-client
    restart: unless-stopped
    depends_on: [server]
    ports: ["7081:7081"]
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./leaveboard-client:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 7081

volumes:
  mongo_data:
